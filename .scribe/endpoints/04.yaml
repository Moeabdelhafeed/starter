name: 'App Settings'
description: ''
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: api/app-settings
    metadata:
      custom: []
      groupName: 'App Settings'
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'List App Settings'
      description: |-
        All active app settings, grouped by block type and localized to the
        request's Accept-Language.

        Public endpoint, no authentication or parameters required. Returns every
        active AppSetting row, translated via `text_api` and grouped under each
        of the fixed block types (`social`, `contact`, `app_store`, `google_play`,
        `app_gallery`). Types with no active rows are returned as empty arrays.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
      Accept-Language: en
      X-API-TOKEN: '{YOUR_APP_X_API_TOKEN}'
      X-Device-Id: 11111111-1111-4111-8111-111111111111
      X-Platform: web
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"success": true, "message": "App settings retrieved successfully.", "errors": null, "data": {"social": [{"id": 1, "text": "Follow us on Instagram", "url": "https://instagram.com/ourapp", "image": "http://localhost:8000/storage/app-settings/instagram-icon.webp"}], "contact": [{"id": 2, "text": "support@ourapp.com", "url": "mailto:support@ourapp.com", "image": null}], "app_store": [{"id": 3, "text": "Download on the App Store", "url": "https://apps.apple.com/app/id123456789", "image": "http://localhost:8000/storage/app-settings/app-store-badge.webp"}], "google_play": [], "app_gallery": []}}'
        headers: []
        description: Success
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
