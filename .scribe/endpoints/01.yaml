    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - DELETE
    uri: 'api/devices/{deviceId}'
    metadata:
      custom: []
      groupName: 'Devices & Guests'
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Revoke Device'
      description: |-
        Revoke a specific device by id (from GET /api/devices). Deletes its Sanctum token (FK cascade drops
        the device row) and broadcasts `device.revoked` on private-user.{userId} so that client clears its
        local credentials.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
      Accept-Language: en
      X-API-TOKEN: '{YOUR_APP_X_API_TOKEN}'
      X-Device-Id: 11111111-1111-4111-8111-111111111111
      X-Platform: web
    urlParameters:
      deviceId:
        custom: []
        name: deviceId
        description: ''
        required: true
        example: architecto
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanUrlParameters:
      deviceId: architecto
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
