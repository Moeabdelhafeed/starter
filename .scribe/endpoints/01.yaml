    uri: api/guest
    metadata:
      custom: []
      groupName: 'Devices & Guests'
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Create Guest Session'
      description: 'Explicit guest creation. Idempotent — returns the existing guest if X-Device-Id already matches one.'
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
      Accept-Language: en
      X-API-TOKEN: '{YOUR_APP_X_API_TOKEN}'
      X-Device-Id: 11111111-1111-4111-8111-111111111111
      X-Platform: web
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"success": true, "message": "Guest created.", "data": {"user": {"id": 99, "name": "Guest", "is_guest": true, "guest_id": "11111111-1111-4111-8111-111111111111", "platform": "web", "is_active": true}}, "errors": null}'
        headers: []
        description: Success
      -
        custom: []
        status: 403
        content: '{"success": false, "message": "Guest mode is disabled.", "errors": null, "data": null}'
        headers: []
        description: 'Guests disabled (APP_GUESTS=false)'
