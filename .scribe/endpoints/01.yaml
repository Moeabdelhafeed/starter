    uri: api/devices
    metadata:
      custom: []
      groupName: 'Devices & Guests'
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'List Devices'
      description: |-
        List the authenticated user's active devices/sessions (only meaningful when MULTI_SESSION_ENABLED=true —
        otherwise there is always exactly one).
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
      Accept-Language: en
      X-API-TOKEN: '{YOUR_APP_X_API_TOKEN}'
      X-Device-Id: 11111111-1111-4111-8111-111111111111
      X-Platform: web
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"success": true, "message": "Operation successful", "data": {"devices": [{"id": 3, "device_name": null, "platform": "ios", "ip": "10.0.0.1", "user_agent": "MyApp/1.0", "last_seen_at": "2026-07-19T09:00:00.000000Z", "created_at": "2026-07-10T08:00:00.000000Z", "is_current": true}, {"id": 2, "device_name": null, "platform": "android", "ip": "10.0.0.2", "user_agent": "MyApp/1.0", "last_seen_at": "2026-07-15T09:00:00.000000Z", "created_at": "2026-07-01T08:00:00.000000Z", "is_current": false}]}, "errors": null}'
        headers: []
        description: Success
