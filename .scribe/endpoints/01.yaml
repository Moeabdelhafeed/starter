        custom: []
        status: 200
        content: '{"success": true, "message": "Device signed out.", "data": null, "errors": null}'
        headers: []
        description: Success
      -
        custom: []
        status: 404
        content: '{"message": "No query results for model [App\\Models\\UserDevice] 999"}'
        headers: []
        description: 'Device id not found for this user (findOrFail — Laravel default shape, NOT the ApiResponse envelope)'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
